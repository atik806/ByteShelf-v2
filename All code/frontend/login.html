<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ByteShelf</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --card: #16161f;
      --border: #2a2a3a;
      --accent: #00ffc2;
      --accent2: #6e44ff;
      --accent3: #ff4466;
      --text: #e8e8f0;
      --muted: #7070a0;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
      --px: clamp(20px, 5vw, 60px);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }

    .cursor,
    .cursor-ring {
      display: none;
    }

    @media (hover: hover) {
      body {
        cursor: none;
      }

      .cursor {
        width: 12px;
        height: 12px;
        background: var(--accent);
        border-radius: 50%;
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 9999;
        mix-blend-mode: difference;
        display: block;
      }

      .cursor-ring {
        width: 40px;
        height: 40px;
        border: 1px solid rgba(0, 255, 194, 0.4);
        border-radius: 50%;
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 9998;
        transition: width 0.2s, height 0.2s, opacity 0.2s;
        display: block;
      }
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9990;
      opacity: 0.6;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(0, 255, 194, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 194, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 48px 40px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo a {
      font-family: var(--mono);
      font-size: 1.5rem;
      color: var(--accent);
      letter-spacing: -0.02em;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .logo-bracket {
      color: var(--accent2);
      font-size: 1.8rem;
    }

    .auth-title {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-align: center;
      margin-bottom: 8px;
    }

    .auth-subtitle {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-subtitle a {
      color: var(--accent);
      text-decoration: none;
    }

    .auth-subtitle a:hover {
      text-decoration: underline;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-group input::placeholder {
      color: var(--muted);
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-family: var(--mono);
      font-size: 0.7rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      cursor: pointer;
    }

    .remember-me input {
      accent-color: var(--accent);
    }

    .forgot-password {
      color: var(--accent);
      text-decoration: none;
    }

    .forgot-password:hover {
      text-decoration: underline;
    }

    .btn-primary {
      width: 100%;
      font-family: var(--mono);
      font-size: 0.82rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 16px 32px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-align: center;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0, 255, 194, 0.3);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .social-login {
      display: flex;
      gap: 12px;
    }

    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.7rem;
      cursor: pointer;
      transition: border-color 0.2s;
      text-decoration: none;
    }

    .social-btn:hover {
      border-color: var(--accent);
    }

    .auth-footer {
      margin-top: 24px;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    .auth-footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.html">
          <span class="logo-bracket">[</span>ByteShelf<span class="logo-bracket">]</span>
        </a>
      </div>
      
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to continue to your library</p>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="remember" />
            Remember me
          </label>
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary">Sign In</button>
      </form>

      <div class="divider">
        <span>or</span>
      </div>

      <div class="social-login">
        <button type="button" class="social-btn" onclick="handleOAuthLogin('github')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          GitHub
        </button>
        <button type="button" class="social-btn" onclick="handleOAuthLogin('google')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
      </div>

      <p class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up free</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    if (Auth.isLoggedIn()) {
      window.location.href = 'dashboard.html';
    }

    async function handleLogin(e) {
      e.preventDefault();
      
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const rememberMe = document.getElementById('remember')?.checked || false;
      const submitBtn = e.target.querySelector('button[type="submit"]');

      FormValidator.clearAllErrors(e.target);

      let hasError = false;

      if (!FormValidator.validateRequired(emailInput.value)) {
        FormValidator.showError(emailInput, 'Email is required');
        hasError = true;
      } else if (!FormValidator.validateEmail(emailInput.value)) {
        FormValidator.showError(emailInput, 'Please enter a valid email');
        hasError = true;
      }

      if (!FormValidator.validateRequired(passwordInput.value)) {
        FormValidator.showError(passwordInput, 'Password is required');
        hasError = true;
      }

      if (hasError) return;

      UIController.showLoading(submitBtn);

      try {
        const response = await API.login(emailInput.value, passwordInput.value, rememberMe);
        
        UIController.showToast('Welcome back! Login successful.', 'success');
        
      } catch (error) {
        UIController.showToast(error.message || 'Login failed. Please try again.', 'error');
      } finally {
        UIController.hideLoading(submitBtn);
      }
    }

    async function handleOAuthLogin(provider) {
      if (!Auth.supabase) {
        UIController.showToast('Authentication not initialized', 'error');
        return;
      }

      const { error } = await Auth.supabase.auth.signInWithOAuth({
        provider: provider,
        options: {
          redirectTo: window.location.origin + '/dashboard.html'
        }
      });

      if (error) {
        UIController.showToast(error.message || 'OAuth login failed', 'error');
      }
    }

    if (window.matchMedia('(hover: hover)').matches) {
      const cursor = document.getElementById('cursor');
      const ring = document.getElementById('cursorRing');
      let mx = 0, my = 0, rx = 0, ry = 0;
      document.addEventListener('mousemove', e => {
        mx = e.clientX; my = e.clientY;
        cursor.style.transform = `translate(${mx - 6}px, ${my - 6}px)`;
      });
      function animateRing() {
        rx += (mx - rx - 20) * 0.12;
        ry += (my - ry - 20) * 0.12;
        ring.style.transform = `translate(${rx}px, ${ry}px)`;
        requestAnimationFrame(animateRing);
      }
      animateRing();
      document.querySelectorAll('a, button, input').forEach(el => {
        el.addEventListener('mouseenter', () => { ring.style.width = '60px'; ring.style.height = '60px'; ring.style.opacity = '0.6'; });
        el.addEventListener('mouseleave', () => { ring.style.width = '40px'; ring.style.height = '40px'; ring.style.opacity = '1'; });
      });
    }
  </script>
</body>

</html>
