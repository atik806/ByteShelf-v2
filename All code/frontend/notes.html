<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Notes — ByteShelf</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --card: #16161f;
      --border: #2a2a3a;
      --accent: #00ffc2;
      --accent2: #6e44ff;
      --accent3: #ff4466;
      --text: #e8e8f0;
      --muted: #7070a0;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9990;
      opacity: 0.6;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(0, 255, 194, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 194, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .dashboard-layout {
      display: flex;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      left: 0;
      top: 0;
    }

    .sidebar-logo {
      padding: 0 8px 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .sidebar-logo a {
      font-family: var(--mono);
      font-size: 1.3rem;
      color: var(--accent);
      text-decoration: none;
    }

    .logo-bracket {
      color: var(--accent2);
      font-size: 1.5rem;
    }

    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      color: var(--muted);
      text-decoration: none;
      font-family: var(--mono);
      font-size: 0.8rem;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .nav-item:hover {
      background: rgba(0, 255, 194, 0.05);
      color: var(--text);
    }

    .nav-item.active {
      background: rgba(0, 255, 194, 0.1);
      color: var(--accent);
    }

    .nav-item svg {
      width: 18px;
      height: 18px;
    }

    .sidebar-footer {
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--card);
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-weight: 700;
      color: var(--bg);
    }

    .user-name {
      font-size: 0.9rem;
      font-weight: 600;
    }

    .user-plan {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--accent);
    }

    .logout-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 16px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.75rem;
      border-radius: 8px;
      cursor: pointer;
    }

    .logout-btn:hover {
      border-color: var(--accent3);
      color: var(--accent3);
    }

    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: 32px;
    }

    .page-header {
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .page-title {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .page-subtitle {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
    }

    .btn-new {
      background: var(--accent);
      color: var(--bg);
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-new:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0, 255, 194, 0.3);
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .search-input {
      flex: 1;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      border-radius: 8px;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .filter-btn {
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .filter-btn.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .note-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .note-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
    }

    .note-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 12px;
    }

    .note-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .note-category {
      display: inline-block;
      background: rgba(110, 68, 255, 0.2);
      color: var(--accent2);
      padding: 4px 10px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 0.6rem;
    }

    .note-content {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 12px;
      max-height: 100px;
      overflow: hidden;
    }

    .note-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    .note-actions {
      display: flex;
      gap: 8px;
    }

    .note-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .note-btn:hover {
      color: var(--accent);
    }

    .pin-btn.pinned {
      color: var(--accent);
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.open {
      display: flex;
    }

    .modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-title {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.5rem;
      cursor: pointer;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      border-radius: 8px;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-textarea {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      border-radius: 8px;
      min-height: 200px;
      resize: vertical;
    }

    .form-textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .color-picker {
      display: flex;
      gap: 8px;
    }

    .color-option {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
    }

    .color-option.selected {
      border-color: var(--accent);
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn-save {
      flex: 1;
      padding: 12px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-cancel {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 0.75rem;
      cursor: pointer;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      grid-column: 1 / -1;
    }

    .empty-state h3 {
      margin-bottom: 8px;
    }

    .empty-state p {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.8rem;
      margin-bottom: 20px;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 8px;
      flex: 1;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 4px;
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        z-index: 100;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .main-content {
        margin-left: 0;
        padding: 80px 16px 32px;
      }

      .notes-grid {
        grid-template-columns: 1fr;
      }

      .page-header {
        flex-direction: column;
        gap: 16px;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><a href="index.html"><span class="logo-bracket">[</span>ByteShelf<span
            class="logo-bracket">]</span></a></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
          </svg>Dashboard</a>
        <a href="my-books.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
          </svg>My Books</a>
        <a href="browse.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>Browse</a>
        <a href="notes.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
          </svg>My Notes</a>
        <a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <circle cx="12" cy="12" r="3" />
          </svg>Settings</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">S</div>
          <div class="user-details">
            <div class="user-name" id="userName">Student</div>
            <div class="user-plan">Starter Plan</div>
          </div>
        </div>
        <button class="logout-btn" onclick="Auth.logout()">Logout</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">My Notes</h1>
          <p class="page-subtitle">Create and organize your study notes</p>
        </div>
        <button class="btn-new" onclick="openNewNoteModal()">+ New Note</button>
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-value" id="totalNotes">0</div>
          <div class="stat-label">Total Notes</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="pinnedNotes">0</div>
          <div class="stat-label">Pinned</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="categoriesCount">0</div>
          <div class="stat-label">Categories</div>
        </div>
      </div>

      <div class="controls">
        <input type="text" class="search-input" id="searchInput" placeholder="Search notes..." onkeyup="searchNotes()">
        <button class="filter-btn" onclick="filterByCategory('all')" data-category="all">All</button>
        <button class="filter-btn" onclick="filterByCategory('general')" data-category="general">General</button>
        <button class="filter-btn" onclick="filterByCategory('study')" data-category="study">Study</button>
        <button class="filter-btn" onclick="filterByCategory('ideas')" data-category="ideas">Ideas</button>
      </div>

      <div class="notes-grid" id="notesGrid">
        <div class="empty-state">
          <h3>No notes yet</h3>
          <p>Create your first note to get started</p>
        </div>
      </div>
    </main>
  </div>

  <!-- New/Edit Note Modal -->
  <div class="modal" id="noteModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">New Note</h2>
        <button class="close-btn" onclick="closeNoteModal()">&times;</button>
      </div>
      <form onsubmit="saveNote(event)">
        <div class="form-group">
          <label class="form-label">Title</label>
          <input type="text" class="form-input" id="noteTitle" placeholder="Note title" required>
        </div>
        <div class="form-group">
          <label class="form-label">Content</label>
          <textarea class="form-textarea" id="noteContent" placeholder="Write your note here..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-input" id="noteCategory">
            <option value="general">General</option>
            <option value="study">Study</option>
            <option value="ideas">Ideas</option>
            <option value="todo">To-Do</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Color</label>
          <div class="color-picker">
            <div class="color-option selected" style="background: #FFE5B4;" onclick="selectColor('#FFE5B4')"></div>
            <div class="color-option" style="background: #FFB3BA;" onclick="selectColor('#FFB3BA')"></div>
            <div class="color-option" style="background: #BAFFC9;" onclick="selectColor('#BAFFC9')"></div>
            <div class="color-option" style="background: #BAE1FF;" onclick="selectColor('#BAE1FF')"></div>
            <div class="color-option" style="background: #FFFFBA;" onclick="selectColor('#FFFFBA')"></div>
          </div>
        </div>
        <div class="modal-buttons">
          <button type="submit" class="btn-save">Save Note</button>
          <button type="button" class="btn-cancel" onclick="closeNoteModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    let allNotes = [];
    let currentFilter = 'all';
    let editingNoteId = null;
    let selectedColor = '#FFE5B4';

    async function loadNotes() {
      try {
        const user = Auth.getUser();
        if (!user) {
          window.location.href = 'login.html';
          return;
        }

        const response = await fetch('/api/notes/', {
          headers: {
            'X-User-ID': user.id || user.email
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        allNotes = data.notes || [];
        renderNotes(allNotes);
        updateStats();
      } catch (error) {
        console.error('Error loading notes:', error);
        showToast('Failed to load notes: ' + error.message, 'error');
      }
    }

    function renderNotes(notes) {
      const grid = document.getElementById('notesGrid');

      if (notes.length === 0) {
        grid.innerHTML = '<div class="empty-state"><h3>No notes found</h3><p>Create your first note to get started</p></div>';
        return;
      }

      grid.innerHTML = notes.map(note => `
        <div class="note-card" style="border-left: 4px solid ${note.color}" onclick="editNote('${note.id}')">
          <div class="note-header">
            <div>
              <div class="note-title">${note.title}</div>
              <span class="note-category">${note.category}</span>
            </div>
            <button class="note-btn pin-btn ${note.pinned ? 'pinned' : ''}" onclick="event.stopPropagation(); togglePin('${note.id}')" title="Pin note">📌</button>
          </div>
          <div class="note-content">${note.content.substring(0, 100)}${note.content.length > 100 ? '...' : ''}</div>
          <div class="note-footer">
            <span>${new Date(note.updated_at).toLocaleDateString()}</span>
            <div class="note-actions">
              <button class="note-btn" onclick="event.stopPropagation(); editNote('${note.id}')" title="Edit">✏️</button>
              <button class="note-btn" onclick="event.stopPropagation(); deleteNote('${note.id}')" title="Delete">🗑️</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function openNewNoteModal() {
      editingNoteId = null;
      document.getElementById('modalTitle').textContent = 'New Note';
      document.getElementById('noteTitle').value = '';
      document.getElementById('noteContent').value = '';
      document.getElementById('noteCategory').value = 'general';
      selectedColor = '#FFE5B4';
      document.getElementById('noteModal').classList.add('open');
    }

    function closeNoteModal() {
      document.getElementById('noteModal').classList.remove('open');
    }

    async function editNote(noteId) {
      const note = allNotes.find(n => n.id === noteId);
      if (!note) return;

      editingNoteId = noteId;
      document.getElementById('modalTitle').textContent = 'Edit Note';
      document.getElementById('noteTitle').value = note.title;
      document.getElementById('noteContent').value = note.content;
      document.getElementById('noteCategory').value = note.category;
      selectedColor = note.color;
      document.getElementById('noteModal').classList.add('open');
    }

    async function saveNote(e) {
      e.preventDefault();

      const user = Auth.getUser();
      if (!user) {
        showToast('Not logged in', 'error');
        return;
      }

      const noteData = {
        title: document.getElementById('noteTitle').value,
        content: document.getElementById('noteContent').value,
        category: document.getElementById('noteCategory').value,
        color: selectedColor
      };

      try {
        const method = editingNoteId ? 'PUT' : 'POST';
        const url = editingNoteId ? `/api/notes/${editingNoteId}` : '/api/notes/';

        const response = await fetch(url, {
          method: method,
          headers: {
            'Content-Type': 'application/json',
            'X-User-ID': user.id || user.email
          },
          body: JSON.stringify(noteData)
        });

        const responseData = await response.json();

        if (response.ok) {
          showToast(editingNoteId ? 'Note updated' : 'Note created', 'success');
          closeNoteModal();
          loadNotes();
        } else {
          console.error('Save error:', responseData);
          showToast(responseData.error || 'Failed to save note', 'error');
        }
      } catch (error) {
        console.error('Error saving note:', error);
        showToast('Error saving note: ' + error.message, 'error');
      }
    }

    async function deleteNote(noteId) {
      if (!confirm('Delete this note?')) return;

      const user = Auth.getUser();
      if (!user) return;

      try {
        const response = await fetch(`/api/notes/${noteId}`, {
          method: 'DELETE',
          headers: {
            'X-User-ID': user.id || user.email
          }
        });

        if (response.ok) {
          showToast('Note deleted', 'success');
          loadNotes();
        } else {
          showToast('Failed to delete note', 'error');
        }
      } catch (error) {
        console.error('Error deleting note:', error);
        showToast('Error deleting note', 'error');
      }
    }

    async function togglePin(noteId) {
      const note = allNotes.find(n => n.id === noteId);
      if (!note) return;

      const user = Auth.getUser();
      if (!user) return;

      try {
        const response = await fetch(`/api/notes/${noteId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-User-ID': user.id || user.email
          },
          body: JSON.stringify({ pinned: !note.pinned })
        });

        if (response.ok) {
          loadNotes();
        }
      } catch (error) {
        console.error('Error toggling pin:', error);
      }
    }

    function searchNotes() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allNotes.filter(note =>
        note.title.toLowerCase().includes(query) ||
        note.content.toLowerCase().includes(query)
      );
      renderNotes(filtered);
    }

    function filterByCategory(category) {
      currentFilter = category;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.category === category);
      });

      const filtered = category === 'all'
        ? allNotes
        : allNotes.filter(note => note.category === category);
      renderNotes(filtered);
    }

    function selectColor(color) {
      selectedColor = color;
      document.querySelectorAll('.color-option').forEach(opt => {
        opt.classList.toggle('selected', opt.style.background === color);
      });
    }

    function updateStats() {
      document.getElementById('totalNotes').textContent = allNotes.length;
      document.getElementById('pinnedNotes').textContent = allNotes.filter(n => n.pinned).length;

      const categories = new Set(allNotes.map(n => n.category));
      document.getElementById('categoriesCount').textContent = categories.size;
    }

    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;bottom:24px;right:24px;padding:16px 24px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-family:var(--mono);font-size:0.8rem;z-index:10000;animation:slideIn 0.3s ease;';
      toast.innerHTML = `<span style="color:${type === 'success' ? 'var(--accent)' : 'var(--text)'}">${message}</span>`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }

      const user = Auth.getUser();
      if (user) {
        document.getElementById('userName').textContent = user.name || 'Student';
        document.getElementById('userAvatar').textContent = (user.name || 'S')[0].toUpperCase();
      }

      loadNotes();
    });
  </script>
</body>

</html>
